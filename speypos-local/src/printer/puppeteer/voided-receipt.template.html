<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Voided Receipt</title>
    <style>
      body {
        width: 70mm;
        margin: 0 !important;
        padding: 8px !important;
        font-family: Arial, sans-serif;
        font-size: 12px;
        color: #000;
        box-sizing: border-box;
      }
      h1 {
        font-size: 16px;
        margin: 0 0 8px 0;
        text-align: center;
      }
      .row {
        margin-bottom: 6px;
      }
      .label {
        font-weight: bold;
      }
      .note {
        white-space: pre-wrap;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 8px;
        margin-bottom: 16px;
        table-layout: fixed;
      }
      th,
      td {
        padding: 4px;
        text-align: left;
        font-size: 12px;
        border: 1px solid rgba(0, 0, 0, 1);
        box-sizing: border-box;
        overflow-wrap: break-word;
      }
      th.item,
      td.item {
        width: 30%;
      }
      th.customizations,
      td.customizations {
        width: 55%;
      }
      th.qty,
      td.qty {
        text-align: right;
        width: 15%;
      }
      .void-meta {
        margin-top: 4px;
      }
    </style>
  </head>
  <body>
    <h1>{{title}}</h1>

    <div class="row"><span class="label">{{orderIdLabel}}:</span> {{orderIdValue}}</div>
    <div class="row"><span class="label">{{dateLabel}}:</span> {{dateValue}}</div>

    <table>
      <thead>
        <tr>
          <th class="item">{{itemsHeader}}</th>
          <th class="customizations">{{customizationsHeader}}</th>
          <th class="qty">{{quantityHeader}}</th>
        </tr>
      </thead>
      <tbody>
        {{items}}
      </tbody>
    </table>

    <div class="void-meta"><span class="label">{{reasonLabel}}:</span> {{reasonValue}}</div>
    <div class="void-meta">
      <span class="label">{{noteLabel}}:</span> <span class="note">{{noteValue}}</span>
    </div>
    <div class="void-meta"><span class="label">{{voidedByLabel}}:</span> {{voidedByValue}}</div>
    <div class="void-meta"><span class="label">{{voidedAtLabel}}:</span> {{voidedAtValue}}</div>
  </body>
</html>
