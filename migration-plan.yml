migration_plan:
  title: SpeyPOS Android Termux Migration Refactor Checklist
  date: 2026-05-10
  scope: Refactor checklist with implementation status
  status_summary:
    refactor_1_runtime_process_model: completed
    refactor_2_printer_layer: completed
    refactor_3_receipt_generation_pipeline: completed
    last_updated: 2026-05-10

  refactors:
    - id: 1
      area: Runtime and process model
      status: completed
      tasks:
        - Replace Windows service assumptions with a Termux-friendly startup model.
        - Add auto-restart and health-check behavior suitable for Android app/process lifecycle.
        - Separate development startup flow from production-on-device startup flow.
      completed_notes:
        - Windows service and launcher scripts removed.
        - Termux watchdog/start-stop-status-log scripts added.
        - Reboot flow now exits with explicit supervisor restart semantics.

    - id: 2
      area: Printer layer
      status: completed
      tasks:
        - Replace OS-specific printing with transport-based printing.
        - Introduce LAN printer adapters (RAW TCP 9100 and optionally IPP).
        - Add printer discovery/config validation, retry, timeout, and queue behavior for unstable WiFi.
        - Keep a fallback mode such as no-printer or console for safe operation.
      completed_notes:
        - RAW TCP 9100 transport and console transport implemented.
        - ESC/POS renderer implemented and wired into printer service.
        - Legacy Puppeteer/Sumatra/Windows print modules removed.
      next_steps:
        - Add optional IPP transport in a future enhancement.
        - Add admin UI controls for printer.lan in a future enhancement.

    - id: 3
      area: Receipt generation pipeline
      status: completed
      tasks:
        - Decouple receipt rendering from printer transport.
        - Make PDF/browser dependency optional so printing can work without Windows/Chrome assumptions.
        - Support direct ESC/POS text or byte output path for network printers when possible.
      completed_notes:
        - Printer path no longer depends on HTML/PDF rendering.
        - ESC/POS payload generation is active.
        - Automated verification added at speypos-local/scripts/tests/refactor3.integration.js.

    - id: 4
      area: Configuration model
      status: completed
      tasks:
        - Move from machine/OS-bound configuration to deployment-profile configuration.
        - Add environment settings for printer host, port, protocol, reconnect behavior, and queue limits.
        - Remove or gate Windows-only settings and binaries.
      completed_notes:
        - RUNTIME_PROFILE enum validation added; unknown values throw at startup.
        - corsOrigin and cloudBaseUrl exported from env.js; CORS_ORIGIN and CLOUD_BASE_URL env vars added.
        - telegram.service.js now uses env.telegramBotToken instead of process.env directly.
        - httpServer.js CORS origin now reads env.corsOrigin; localhost:8000 no longer hardcoded.
        - Cloud base URL consolidated from 4 locations into env.cloudBaseUrl (settings.service.js, cloudIngest.service.js, cloudHandshake.service.js, settings.controller.js).
        - Phantom TELEGRAM_CHAT_ID removed from README .env example.
        - .env.example added with all 9 real variables.
        - Automated verification at speypos-local/scripts/tests/refactor4.integration.js.

    - id: 5
      area: Deployment and operations scripts
      status: completed
      tasks:
        - Replace Windows install/uninstall/launcher scripts with Termux scripts.
        - Add one-command setup for dependencies, data directories, and startup command.
        - Add lightweight operational commands: start, stop, status, logs, restart.
      completed_notes:
        - setup.sh added — installs Termux packages, npm install, data dirs, .env, Termux:Boot hook.
        - watchdog.sh curl guard added; degrades gracefully if curl absent; HEALTH_URL built from .env PORT.
        - boot.sh output redirected to runtime log for on-device diagnostics.
        - stop.sh post-SIGTERM wait loop added; restart.sh hardcoded sleep 2 removed.
        - start.sh startup confirmation poll added for watchdog.pid.
        - All 8 scripts standardized to set -euo pipefail.
        - nodemon.json extended to ignore SQLite WAL files, images, receipts, logs; watch scoped to src/.
        - start:android npm script added to speypos-local/package.json.
        - termux:setup and termux:boot added to root package.json.
        - Automated verification at speypos-local/scripts/tests/refactor5.integration.js.

    - id: 6
      area: Dependency and build compatibility
      status: completed
      tasks:
        - Revalidate native dependencies on Android ARM.
        - Replace or isolate packages that are fragile in Termux.
        - Pin known-good runtime versions and document install order.
      completed_notes:
        - better-sqlite3 glibc prebuilts never load on Termux (Bionic libc); must compile from source.
        - setup.sh pkg install extended with clang, make, python, pkg-config (required, not optional).
        - setup.sh native smoke test added after npm install — opens in-memory DB and runs SELECT 1.
        - better-sqlite3 exact-pinned to 11.10.0 in package.json (no ^ range drift).
        - engines field added to package.json (node >=22.0.0, npm >=10.0.0).
        - All other deps (cors, express, multer, date-fns-tz, dotenv, winston) are pure JS — no ARM issues.
        - Automated verification at speypos-local/scripts/tests/refactor6.integration.js.

    - id: 7
      area: Storage and filesystem assumptions
      tasks:
        - Normalize all paths for Android storage realities.
        - Ensure write permissions, directory creation, and log/data retention policies on-device.
        - Confirm backup/export paths for practical support workflows.

    - id: 8
      area: Networking and local API behavior
      tasks:
        - Confirm local server binding, ports, and CORS behavior for Android-hosted frontend/backend.
        - Add resilient handling for network transitions such as WiFi drop/reconnect and IP changes.

    - id: 9
      area: Observability and recovery
      tasks:
        - Improve structured logs for mobile diagnostics.
        - Add crash-safe startup checks and recovery actions.
        - Add explicit degraded-mode signals (for example printer unavailable but POS still usable).

    - id: 10
      area: Documentation and runbook
      tasks:
        - Replace Windows-centric operational docs with Android/Termux operating instructions.
        - Add troubleshooting for printer connectivity, background kills, and startup failures.
        - Define supported device/printer matrix and minimum requirements.
