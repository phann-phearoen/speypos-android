# SpeyPOS API Documentation
# This file describes the available API endpoints for the SpeyPOS backend.
# It is optimized for machine parsing by AI agents.

endpoints:
  # Authentication
  - path: /api/auth/login
    method: POST
    description: Authenticates a staff member and returns their details.
    request:
      body:
        required: [name, password]
        properties:
          name: { type: string, description: "The staff member's name." }
          password: { type: string, description: "The staff member's password." }
    response:
      success:
        status: 200
        body:
          description: The staff member object, excluding the password hash.
      error:
        status: 401
        description: Returned for invalid credentials.

  # File Management
  - path: /api/upload/:type
    method: POST
    description: Uploads an image file for a specific resource type.
    permissions: admin
    request:
      params:
        - name: type
          type: string
          description: "The resource type. Allowed: 'menu', 'category', 'staff'."
          required: true
      body:
        description: "A multipart/form-data request with a single field named 'image'."
        content_type: multipart/form-data
    response:
      success:
        status: 201
        body:
          description: "Returns the relative URL and filename of the uploaded image."
          example:
            message: "File uploaded successfully."
            url: "/media/menu/1672531200000-a1b2c3d4.png"
            filename: "1672531200000-a1b2c3d4.png"
      error:
        status: 400
        description: "Returned for invalid file type, file size limit exceeded, or other upload errors."
  - path: /api/media/:type/:filename
    method: DELETE
    description: Deletes a previously uploaded image file.
    permissions: admin
    request:
      params:
        - name: type
          type: string
          description: "The resource type. Allowed: 'menu', 'category', 'staff'."
          required: true
        - name: filename
          type: string
          description: "The unique filename of the image to delete."
          required: true
    response:
      success:
        status: 204
        description: "No content, indicating successful deletion."
      error:
        status: 404
        description: "Returned if the file is not found."

  # Menu Item
  - path: /api/menu-item
    method: GET
    description: Retrieves a list of all menu items.
  - path: /api/menu-item/:id
    method: GET
    description: Retrieves a single menu item by its unique ID.
  - path: /api/menu-item
    method: POST
    description: Creates a new menu item.
    permissions: admin
    request:
      body:
        required: [name, price]
  - path: /api/menu-item/:id
    method: PATCH
    description: Partially updates an existing menu item.
    permissions: admin
  - path: /api/menu-item/:id
    method: DELETE
    description: Deletes a menu item.
    permissions: admin

  # Menu Category
  - path: /api/menu-category
    method: GET
    description: Retrieves a list of all menu categories.
  - path: /api/menu-category/:id
    method: GET
    description: Retrieves a single menu category by its ID.
  - path: /api/menu-category
    method: POST
    description: Creates a new menu category.
    permissions: admin
    request:
      body:
        required: [name]
  - path: /api/menu-category/:id
    method: PATCH
    description: Partially updates a menu category.
    permissions: admin
  - path: /api/menu-category/:id
    method: DELETE
    description: Deletes a menu category.
    permissions: admin

  # Customization Metadata
  - path: /api/customization-option-group
    method: GET
    description: Retrieves all customization option groups.
    response:
      success:
        status: 200
        body:
          type: array
          items:
            type: object
            properties:
              id: { type: string }
              name: { type: string }
              selection_type: { type: string }
              required: { type: boolean }
              sort_order: { type: integer }
              default_option_id: { type: string, nullable: true }
              created_at: { type: integer }
              updated_at: { type: integer, nullable: true }
  - path: /api/customization-option-group/:id
    method: GET
    description: Retrieves a single customization option group.
    response:
      success:
        status: 200
        body:
          description: "The full customization option group object."
          properties:
            id: { type: string }
            name: { type: string }
            selection_type: { type: string }
            required: { type: boolean }
            sort_order: { type: integer }
            default_option_id: { type: string, nullable: true }
            created_at: { type: integer }
            updated_at: { type: integer, nullable: true }
  - path: /api/customization-option-group
    method: POST
    description: Creates a new customization option group.
    permissions: admin
    request:
      body:
        required: [name, selection_type]
        properties:
          name: { type: string }
          selection_type: { type: string, enum: [single, multiple] }
          required: { type: boolean, default: false }
          sort_order: { type: integer, default: 0 }
          default_option_id: { type: string, description: "ID of the default CustomizationOption for this group." }
    response:
      success:
        status: 201
        body:
          description: "The full customization option group object."
          properties:
            id: { type: string }
            name: { type: string }
            selection_type: { type: string }
            required: { type: boolean }
            sort_order: { type: integer }
            default_option_id: { type: string, nullable: true }
            created_at: { type: integer }
            updated_at: { type: integer, nullable: true }
  - path: /api/customization-option-group/:id
    method: PATCH
    description: Updates a customization option group.
    permissions: admin
    request:
      body:
        properties:
          name: { type: string }
          selection_type: { type: string, enum: [single, multiple] }
          required: { type: boolean }
          sort_order: { type: integer }
          default_option_id: { type: string, description: "ID of the default CustomizationOption for this group." }
    response:
      success:
        status: 200
        body:
          description: "The full updated customization option group object."
          properties:
            id: { type: string }
            name: { type: string }
            selection_type: { type: string }
            required: { type: boolean }
            sort_order: { type: integer }
            default_option_id: { type: string, nullable: true }
            created_at: { type: integer }
            updated_at: { type: integer, nullable: true }
  - path: /api/customization-option-group/:id
    method: DELETE
    description: Deletes a customization option group.
    permissions: admin
  - path: /api/customization-option
    method: GET
    description: Retrieves customization options. Can be filtered by ?customization_group_id=.
  - path: /api/customization-option/:id
    method: GET
    description: Retrieves a single customization option.
  - path: /api/customization-option
    method: POST
    description: Creates a new customization option.
    permissions: admin
  - path: /api/customization-option/:id
    method: PATCH
    description: Updates a customization option.
    permissions: admin
  - path: /api/customization-option/:id
    method: DELETE
    description: Deletes a customization option.
    permissions: admin
  - path: /api/menu-item-customization-group
    method: GET
    description: Retrieves links between menu items and customization groups.
  - path: /api/menu-item-customization-group
    method: POST
    description: Links a menu item to a customization group.
    permissions: admin
  - path: /api/menu-item-customization-group/:id
    method: DELETE
    description: Deletes a link between a menu item and a customization group.
    permissions: admin

  # Staff
  - path: /api/staff
    method: GET
    description: Retrieves a list of all staff members.
    permissions: admin
  - path: /api/staff/:id
    method: GET
    description: Retrieves a single staff member by ID.
    permissions: admin
  - path: /api/staff
    method: POST
    description: Creates a new staff member.
    permissions: admin
    request:
      body:
        required: [name, role, password]
  - path: /api/staff/:id
    method: PATCH
    description: Partially updates a staff member.
    permissions: admin
  - path: /api/staff/:id
    method: DELETE
    description: Deletes a staff member.
    permissions: admin

  # Shift
  - path: /api/shifts/open
    method: POST
    description: Opens a new shift and assigns a staff member to it.
    request:
      body:
        required: [staff_id, date]
    response:
      success:
        status: 201
        body:
          description: "The full shift object, including the assigned staff_id."
          properties:
            id: { type: string }
            status: { type: string, example: "open" }
            started_at: { type: integer }
            ended_at: { type: integer, nullable: true }
            date: { type: string, format: "date" }
            staff_id: { type: string }
  - path: /api/shift/:id
    method: PATCH
    description: Updates a shift, commonly to close it.
    response:
      success:
        status: 200
        body:
          description: "The full updated shift object."
          properties:
            id: { type: string }
            status: { type: string }
            started_at: { type: integer }
            ended_at: { type: integer, nullable: true }
            date: { type: string, format: "date" }
            staff_id: { type: string }
  - path: /api/shift
    method: GET
    description: Retrieves a list of all shifts.
    request:
      query:
        - { name: date, type: string, description: "Filter shifts by date (YYYY-MM-DD)." }
    response:
      success:
        status: 200
        body:
          type: array
          items:
            type: object
            properties:
              id: { type: string }
              status: { type: string }
              started_at: { type: integer }
              ended_at: { type: integer, nullable: true }
              date: { type: string, format: "date" }
              staff_id: { type: string }
  - path: /api/shift/:id
    method: GET
    description: Retrieves a single shift by ID.
    response:
      success:
        status: 200
        body:
          description: "The full shift object."
          properties:
            id: { type: string }
            status: { type: string }
            started_at: { type: integer }
            ended_at: { type: integer, nullable: true }
            date: { type: string, format: "date" }
            staff_id: { type: string }

  # Order
  - path: /api/orders
    method: POST
    description: Creates a new complete order in a single transaction.
  - path: /api/orders
    method: GET
    description: Retrieves a list of all orders (summary view).
    request:
      query:
        - { name: shift_id, type: string, description: "Filter orders by a specific shift ID." }
        - { name: staff_id, type: string, description: "Filter orders by a specific staff ID." }
  - path: /api/orders/:id
    method: GET
    description: Retrieves a single complete order by ID, including items and payments.
  - path: /api/orders/:id/pay
    method: POST
    description: Records a payment for a 'pending' order.
  - path: /api/orders/:id/print
    method: POST
    description: Triggers the printer service to print a receipt for an order.

  # Mappings (Legacy)
  - path: /api/menu-item-category-map
    method: POST
    description: Links a menu item to a menu category.
  - path: /api/menu-item-category-map/:id
    method: DELETE
    description: Deletes a specific link between a menu item and a category.
  - path: /api/menu-item-category-map
    method: GET
    description: Retrieves all item-category links.

  - path: /api/staff-shift
    method: POST
    description: Links a staff member to a shift.
  - path: /api/staff-shift/:id
    method: DELETE
    description: Deletes a specific link between a staff member and a shift.
  - path: /api/staff-shift
    method: GET
    description: Retrieves all staff-shift links.

  # Settings
  - path: /api/settings
    method: GET
    description: Retrieves a list of all application settings.
    response:
      success:
        status: 200
        body:
          type: array
          items:
            type: object
            properties:
              id: { type: string }
              key: { type: string }
              value: { type: any, description: "The setting's value, cast to its correct type." }
              value_type: { type: string, enum: [string, number, boolean, json] }
              category: { type: string }
              description: { type: string, nullable: true }
  - path: /api/settings/:key
    method: GET
    description: Retrieves a single setting by its unique key.
    request:
      params:
        - name: key
          type: string
          description: "The unique key of the setting, e.g., 'pos.currency'."
          required: true
    response:
      success:
        status: 200
        body:
          type: object
          properties:
            id: { type: string }
            key: { type: string }
            value: { type: any }
            value_type: { type: string }
            category: { type: string }
            description: { type: string, nullable: true }
      error:
        status: 404
        description: "Returned if the setting key does not exist."
  - path: /api/settings/:key
    method: PUT
    description: Creates a new setting or updates an existing one.
    permissions: admin
    request:
      params:
        - name: key
          type: string
          description: "The unique key of the setting."
          required: true
      body:
        required: [value, value_type, category]
        properties:
          value: { type: any, description: "The value to set. Must be parsable to the 'value_type'." }
          value_type: { type: string, enum: [string, number, boolean, json], description: "The intended data type for the value." }
          category: { type: string, description: "A category for grouping the setting, e.g., 'pos'." }
          description: { type: string, nullable: true, description: "A human-readable description of the setting." }
    response:
      success:
        status: 200
        body:
          description: "Returns the final, upserted setting object with its value cast to the correct type."
          properties:
            key: { type: string }
            value: { type: any }
      error:
        - status: 400
          description: "Returned for invalid 'value_type' or missing required fields."
        - status: 403
          description: "Returned if the user is not an administrator."