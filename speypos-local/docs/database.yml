# SpeyPOS Database Schema Documentation
# This file describes the database tables, columns, and relationships.
# It is optimized for machine parsing by AI agents.

tables:
  - name: MenuItem
    description: Represents a single product that can be sold, e.g., "Latte".
    columns:
      - { name: id, type: TEXT, constraints: [PRIMARY KEY], description: "Unique identifier." }
      - { name: name, type: TEXT, constraints: [NOT NULL], description: "Display name of the item." }
      - { name: image_url, type: TEXT, description: "URL for the item's image." }
      - { name: price, type: REAL, constraints: [NOT NULL], description: "Base price of the item." }
      - { name: sort_order, type: INTEGER, constraints: [NOT NULL, DEFAULT 0], description: "Order for sorting items in a list." }
      - { name: created_at, type: INTEGER, constraints: [NOT NULL], description: "Timestamp of creation." }
      - { name: updated_at, type: INTEGER, description: "Timestamp of last update." }

  - name: MenuCategory
    description: A category to group menu items, e.g., "Hot Drinks".
    columns:
      - { name: id, type: TEXT, constraints: [PRIMARY KEY], description: "Unique identifier." }
      - { name: name, type: TEXT, constraints: [NOT NULL], description: "Display name of the category." }
      - { name: image_url, type: TEXT, description: "URL for the category's image." }
      - { name: created_at, type: INTEGER, constraints: [NOT NULL], description: "Timestamp of creation." }

  - name: MenuItemCategoryMap
    description: A join table to link menu items to categories (many-to-many).
    columns:
      - { name: id, type: TEXT, constraints: [PRIMARY KEY], description: "Unique identifier for the mapping." }
      - { name: menu_item_id, type: TEXT, constraints: [NOT NULL], description: "Foreign key for the menu item." }
      - { name: menu_category_id, type: TEXT, constraints: [NOT NULL], description: "Foreign key for the menu category." }
    relationships:
      - { type: belongs_to, target_table: MenuItem, foreign_key: menu_item_id }
      - { type: belongs_to, target_table: MenuCategory, foreign_key: menu_category_id }

  - name: Staff
    description: Represents a staff member who can operate the POS.
    columns:
      - { name: id, type: TEXT, constraints: [PRIMARY KEY], description: "Unique identifier." }
      - { name: name, type: TEXT, constraints: [NOT NULL], description: "Full name of the staff member." }
      - { name: password, type: TEXT, constraints: [NOT NULL], description: "Hashed password for the staff member." }
      - { name: role, type: TEXT, constraints: [NOT NULL], description: "Role, e.g., 'admin' or 'staff'." }
      - { name: status, type: TEXT, constraints: [NOT NULL], description: "Status, e.g., 'active', 'inactive'." }
      - { name: created_at, type: INTEGER, constraints: [NOT NULL], description: "Timestamp of creation." }
      - { name: updated_at, type: INTEGER, description: "Timestamp of last update." }

  - name: Shift
    description: Represents a work shift.
    columns:
      - { name: id, type: TEXT, constraints: [PRIMARY KEY], description: "Unique identifier." }
      - { name: status, type: TEXT, constraints: [NOT NULL], description: "Status, e.g., 'open', 'closed'." }
      - { name: started_at, type: INTEGER, constraints: [NOT NULL], description: "Timestamp when the shift started." }
      - { name: ended_at, type: INTEGER, description: "Timestamp when the shift ended." }
      - { name: date, type: TEXT, constraints: [NOT NULL], description: "The calendar date of the shift, e.g., '2025-12-25'." }

  - name: StaffShift
    description: A join table to link staff members to shifts (many-to-many).
    columns:
      - { name: id, type: TEXT, constraints: [PRIMARY KEY], description: "Unique identifier for the mapping." }
      - { name: shift_id, type: TEXT, constraints: [NOT NULL], description: "Foreign key for the shift." }
      - { name: staff_id, type: TEXT, constraints: [NOT NULL], description: "Foreign key for the staff member." }
    relationships:
      - { type: belongs_to, target_table: Shift, foreign_key: shift_id }
      - { type: belongs_to, target_table: Staff, foreign_key: staff_id }

  - name: Order
    description: Represents a single customer order, containing multiple items.
    columns:
      - { name: id, type: TEXT, constraints: [PRIMARY KEY], description: "Unique identifier." }
      - { name: shift_id, type: TEXT, constraints: [NOT NULL] }
      - { name: staff_id, type: TEXT, constraints: [NOT NULL] }
      - { name: status, type: TEXT, constraints: [NOT NULL], description: "e.g., 'pending', 'completed', 'voided'." }
      - { name: customer_type, type: TEXT, description: "e.g., 'dine-in', 'take-away'." }
      - { name: total_amount, type: REAL, constraints: [NOT NULL], description: "Total cost of the order." }
      - { name: total_items, type: INTEGER, constraints: [NOT NULL], description: "Total number of items in the order." }
      - { name: created_at, type: INTEGER, constraints: [NOT NULL], description: "Timestamp of creation." }
    relationships:
      - { type: belongs_to, target_table: Shift, foreign_key: shift_id }
      - { type: belongs_to, target_table: Staff, foreign_key: staff_id }
      - { type: has_many, target_table: OrderItem, foreign_key: order_id }
      - { type: has_many, target_table: Payment, foreign_key: order_id }

  - name: OrderItem
    description: Represents a single line item within an order.
    columns:
      - { name: id, type: TEXT, constraints: [PRIMARY KEY], description: "Unique identifier." }
      - { name: order_id, type: TEXT, constraints: [NOT NULL] }
      - { name: menu_item_id, type: TEXT, constraints: [NOT NULL] }
      - { name: quantity, type: INTEGER, constraints: [NOT NULL] }
      - { name: unit_price, type: REAL, constraints: [NOT NULL], description: "Price of the item at the time of order." }
    relationships:
      - { type: belongs_to, target_table: Order, foreign_key: order_id }
      - { type: belongs_to, target_table: MenuItem, foreign_key: menu_item_id }
      - { type: has_many, target_table: OrderCustomization, foreign_key: order_item_id }

  - name: OrderCustomization
    description: A snapshot of a selected customization for an order item.
    columns:
      - { name: id, type: TEXT, constraints: [PRIMARY KEY], description: "Unique identifier." }
      - { name: order_item_id, type: TEXT, constraints: [NOT NULL] }
      - { name: name, type: TEXT, constraints: [NOT NULL], description: "Name of the customization, e.g., 'No Sugar'." }
      - { name: option_type, type: TEXT, description: "Type of option, e.g., 'syrup', 'milk'." }
      - { name: value, type: TEXT, description: "Value of the option, e.g., 'almond'." }
      - { name: price, type: REAL, constraints: [NOT NULL], description: "Additional price for this customization at the time of order." }
    relationships:
      - { type: belongs_to, target_table: OrderItem, foreign_key: order_item_id }

  - name: Payment
    description: Represents a payment transaction for an order.
    columns:
      - { name: id, type: TEXT, constraints: [PRIMARY KEY], description: "Unique identifier." }
      - { name: order_id, type: TEXT, constraints: [NOT NULL] }
      - { name: status, type: TEXT, constraints: [NOT NULL], description: "e.g., 'completed', 'failed'." }
      - { name: payment_type, type: TEXT, constraints: [NOT NULL], description: "e.g., 'cash', 'card'." }
      - { name: amount, type: REAL, constraints: [NOT NULL], description: "Amount paid." }
      - { name: received_cash, type: REAL, description: "For cash payments, the amount received." }
      - { name: change, type: REAL, description: "For cash payments, the change given." }
      - { name: created_at, type: INTEGER, constraints: [NOT NULL], description: "Timestamp of payment." }
    relationships:
      - { type: belongs_to, target_table: Order, foreign_key: order_id }

  - name: CustomizationOptionGroup
    description: Defines a group of customization options, e.g., "Size", "Sugar Level".
    columns:
      - { name: id, type: TEXT, constraints: [PRIMARY KEY] }
      - { name: name, type: TEXT, constraints: [NOT NULL] }
      - { name: selection_type, type: TEXT, constraints: [NOT NULL], description: "'single' or 'multiple'" }
      - { name: required, type: INTEGER, constraints: [NOT NULL, DEFAULT 0], description: "0 for false, 1 for true" }
      - { name: sort_order, type: INTEGER, constraints: [NOT NULL, DEFAULT 0] }
      - { name: default_option_id, type: TEXT, description: "Foreign key to the default CustomizationOption for this group." }
      - { name: created_at, type: INTEGER, constraints: [NOT NULL] }
      - { name: updated_at, type: INTEGER }
    relationships:
      - { type: has_many, target_table: CustomizationOption, foreign_key: customization_group_id }

  - name: CustomizationOption
    description: Defines a single choice within a group, e.g., "Large", "50%".
    columns:
      - { name: id, type: TEXT, constraints: [PRIMARY KEY] }
      - { name: customization_group_id, type: TEXT, constraints: [NOT NULL] }
      - { name: label, type: TEXT, constraints: [NOT NULL] }
      - { name: price_delta, type: REAL, constraints: [NOT NULL, DEFAULT 0], description: "Price difference for this option." }
      - { name: sort_order, type: INTEGER, constraints: [NOT NULL, DEFAULT 0] }
      - { name: created_at, type: INTEGER, constraints: [NOT NULL] }
      - { name: updated_at, type: INTEGER }
    relationships:
      - { type: belongs_to, target_table: CustomizationOptionGroup, foreign_key: customization_group_id }

  - name: MenuItemCustomizationGroup
    description: Links menu items to customization groups (many-to-many).
    columns:
      - { name: id, type: TEXT, constraints: [PRIMARY KEY] }
      - { name: menu_item_id, type: TEXT, constraints: [NOT NULL] }
      - { name: customization_group_id, type: TEXT, constraints: [NOT NULL] }
    relationships:
      - { type: belongs_to, target_table: MenuItem, foreign_key: menu_item_id }
      - { type: belongs_to, target_table: CustomizationOptionGroup, foreign_key: customization_group_id }

  - name: Settings
    description: Stores global, application-wide configuration settings.
    columns:
      - { name: id, type: TEXT, constraints: [PRIMARY KEY], description: "Unique identifier." }
      - { name: key, type: TEXT, constraints: [NOT NULL, UNIQUE], description: "The unique key for the setting, e.g., 'pos.currency'." }
      - { name: value, type: TEXT, constraints: [NOT NULL], description: "The value of the setting, stored as a string." }
      - { name: value_type, type: TEXT, constraints: [NOT NULL], description: "The data type of the value, e.g., 'string', 'number', 'boolean', 'json'." }
      - { name: category, type: TEXT, constraints: [NOT NULL], description: "A category for grouping settings, e.g., 'pos', 'printing'." }
      - { name: description, type: TEXT, description: "A human-readable description of what the setting does." }
      - { name: created_at, type: INTEGER, constraints: [NOT NULL], description: "Timestamp of creation." }
      - { name: updated_at, type: INTEGER, description: "Timestamp of last update." }