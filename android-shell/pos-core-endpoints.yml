          - price: number
          - image_url: string|null
        server_added:
          - updated_at: number_ms_epoch
    success_responses:
      create_post:
        status: 201
        returns_full_object: true
        shape:
          - id: uuid
          - name: string
          - price: number
          - image_url: string|null
          - created_at: number_ms_epoch
          - updated_at: number_ms_epoch|null
          - category_ids: string[]
      update_patch:
        status: 200
        returns_full_object: true
        shape:
          - id: uuid
          - name: string
          - price: number
          - image_url: string|null
          - created_at: number_ms_epoch
          - updated_at: number_ms_epoch|null
