name: Production Release

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Frontend Dependencies
        run: npm ci --prefix speypos-pwa

      - name: Build Frontend for Android
        run: npm run pwa:build:android-webview

      - name: Grant Execute Permission to Gradlew
        working-directory: android-shell
        run: chmod +x gradlew

      - name: Build Release APK
        working-directory: android-shell
        run: ./gradlew assembleRelease
        env:
          # If you have signing configs in build.gradle, you can pass them here
          # Otherwise, we use the build artifact from assembleRelease
          RELEASE_KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}

      - name: Sign APK
        uses: r0adkll/sign-android-release@v1
        id: sign_app
        with:
          releaseDirectory: android-shell/app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.RELEASE_SIGNING_KEY_BASE64 }}
          alias: ${{ secrets.RELEASE_KEY_ALIAS }}
          keyStorePassword: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.RELEASE_KEY_PASSWORD }}
        env:
          BUILD_TOOLS_VERSION: "34.0.0"

      - name: Prepare Update Metadata
        id: metadata
        run: |
          VERSION_NAME=$(grep "versionName" android-shell/app/build.gradle.kts | awk -F'"' '{print $2}')
          VERSION_CODE=$(grep "versionCode" android-shell/app/build.gradle.kts | awk '{print $3}')
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          
          echo "versionName=$VERSION_NAME" >> $GITHUB_OUTPUT
          echo "versionCode=$VERSION_CODE" >> $GITHUB_OUTPUT
          
          cat <<EOF > update.json
          {
            "versionCode": $VERSION_CODE,
            "versionName": "$VERSION_NAME",
            "priority": "HIGH",
            "url": "https://${{ secrets.AWS_S3_BUCKET }}.s3.amazonaws.com/release/latest/speypos-shell-latest.apk",
            "timestamp": "$TIMESTAMP"
          }
          EOF

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Upload to S3 (Versioned)
        run: |
          aws s3 cp ${{ steps.sign_app.outputs.signedReleaseFile }} s3://${{ secrets.AWS_S3_BUCKET }}/release/v${{ steps.metadata.outputs.versionName }}/speypos-shell-v${{ steps.metadata.outputs.versionName }}.apk
          aws s3 cp update.json s3://${{ secrets.AWS_S3_BUCKET }}/release/v${{ steps.metadata.outputs.versionName }}/update.json

      - name: Update Latest S3
        run: |
          aws s3 cp ${{ steps.sign_app.outputs.signedReleaseFile }} s3://${{ secrets.AWS_S3_BUCKET }}/release/latest/speypos-shell-latest.apk
          aws s3 cp update.json s3://${{ secrets.AWS_S3_BUCKET }}/release/latest/update.json
