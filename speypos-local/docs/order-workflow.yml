workflow_name: Order and Payment Workflow

description: >
  This document outlines the typical workflow for creating an order and processing a payment through the SpeyPOS API.

stages:
  - name: Order Creation
    description: The process begins when a staff member creates a new order for a customer.
    endpoint: /api/orders
    method: POST
    request_body:
      description: >
        The client must send a JSON object with the following structure. 
        All monetary values should be provided in a standard decimal format (e.g., 12.50).
      content_type: application/json
      example:
        shift_id: "string (UUID)"
        staff_id: "string (UUID)"
        customer_type: "dine-in"
        items:
          - menu_item_id: "string (UUID)"
            quantity: 1
            unit_price: 12.50
            customizations:
              - name: "Size"
                option_type: "SINGLE"
                value: "Large"
                price: 2.50
    backend_process:
      - step: 1
        action: Validation
        details: The server validates that shift_id, staff_id, and a non-empty items array are present.
      - step: 2
        action: Order Record Creation
        details: >
          A new record is created in the "Order" table. The status is set to 'pending'.
          The total_amount is calculated securely on the backend.
          Monetary values are converted to integers for safe storage (e.g., $12.50 becomes 1250).
      - step: 3
        action: Order Items Creation
        details: For each item in the items array, a record is created in the OrderItem table.
      - step: 4
        action: Customizations Creation
        details: For each customization, a record is created in the OrderCustomization table.
      - step: 5
        action: Transaction
        details: All database operations are performed within a single transaction to ensure data integrity.
    response:
      status_code: 201 Created
      description: The server responds with the full order object, including the newly generated ID and calculated totals.
      content_type: application/json
      example:
        id: "a1b2c3d4-..."
        status: "pending"
        total_amount: 1500 # Represents 15.00
        items: []
        payments: []

  - name: Payment Processing
    description: Once an order is created, the next step is to process the payment.
    endpoint: /api/orders/:id/pay
    method: POST
    request_body:
      description: The client sends the payment details. The `:id` in the URL is the UUID of the order.
      content_type: application/json
      example:
        payment_type: "cash"
        amount: 15.00
        received_cash: 20.00
        change: 5.00
    backend_process:
      - step: 1
        action: Validation
        details: The server checks for the required payment_type and amount fields.
      - step: 2
        action: Order Verification
        details: >
          Retrieves the order by its id and verifies its status is 'pending'.
          This prevents duplicate payments.
      - step: 3
        action: Payment Creation & Order Update
        details: >
          A new record is created in the Payment table.
          The status of the original "Order" record is updated from 'pending' to 'completed'.
          This is done in a database transaction.
      - step: 4
        action: Notification
        details: A non-blocking call is made to send a notification about the newly completed order.
    response:
      status_code: 200 OK
      description: >
        The server responds with the fully updated order object, 
        which now includes the payment information and reflects the new 'completed' status.
      content_type: application/json
      example:
        id: "a1b2c3d4-..."
        status: "completed"
        total_amount: 1500
        items: []
        payments:
          - id: "p1a2b3c4-..."
            payment_type: "cash"
            amount: 1500
            status: "completed"