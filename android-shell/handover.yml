handover_version: 1
generated_at: 2026-05-13
project: speypos-android-shell
owner_scope:
  in_scope:
    - Android shell coding and configuration development
    - Native WebView host, native bridge, native persistence, worker scheduling
    - Frontend compatibility contract alignment for native runtime

expected_app_structure:
  overview:
    - Android app hosts bundled frontend in WebView via virtual domain asset loading
    - Frontend calls native bridge first when apiProvider=native
    - Native bridge delegates to NativeConfigStore for persistence and runtime actions
    - Print queue processing is durable and retried by WorkManager
  runtime_flow:
    - MainActivity boots app, configures WebView, binds bridge, schedules workers
    - SpeyposNativeBridge exposes order, shift, staff, settings, status, and queue methods
    - NativeConfigStore persists orders/settings/queue in SharedPreferences JSON blobs
    - PrintQueueWorker periodically processes retryable print jobs
  key_files:
    - android-shell/app/src/main/java/com/speypos/shell/MainActivity.kt
    - android-shell/app/src/main/java/com/speypos/shell/SpeyposNativeBridge.kt
    - android-shell/app/src/main/java/com/speypos/shell/NativeConfigStore.kt
    - android-shell/app/src/main/java/com/speypos/shell/PrintQueueWorker.kt
    - android-shell/app/build.gradle.kts

native_runtime_contracts:
  bridge_methods_added:
    - getPrintQueueStatus
    - triggerPrintQueueRetry
  queue_state_machine:
    - pending
    - retrying
    - processing
    - succeeded
    - duplicate_prevented
    - dead_letter
  print_rules:
    initial_print:
      duplicate_prevention: true
      idempotency_key: print-initial-<order_id>
    reprint:
      allowed: true
      id_pattern: print-reprint-<order_id>-<timestamp>
  printer_methods_locked:
    supported_connection_method:
      - lan
      - wifi
    transport: raw_tcp_9100

implemented_slices:
  - id: printer_method_lock
    summary: Printer connection method locked to lan or wifi across defaults, validation, and runtime usage.
    files:
      - speypos-local/src/services/settings.service.js
      - speypos-local/src/validators/settings.validator.js
      - speypos-local/src/printer/printerService.js
      - android-shell/app/src/main/java/com/speypos/shell/NativeConfigStore.kt
  - id: native_print_queue_foundation
    summary: Persisted queue, retry backoff, dead-letter, queue summary, and bridge retry trigger added.
    files:
      - android-shell/app/src/main/java/com/speypos/shell/NativeConfigStore.kt
      - android-shell/app/src/main/java/com/speypos/shell/SpeyposNativeBridge.kt
      - android-shell/app/src/main/java/com/speypos/shell/PrintQueueWorker.kt
      - android-shell/app/src/main/java/com/speypos/shell/MainActivity.kt
  - id: compatibility_alignment
    summary: Native-first retry trigger and queue fields aligned in frontend compatibility/types.
    files:
      - speypos-pwa/src/lib/compatibility/system.ts
      - speypos-pwa/src/lib/compatibility/nativeBridge.ts
      - speypos-pwa/src/types/pos.ts

open_technical_gaps:
  - Native print queue currently validates printer target and queue lifecycle; full Android-native raw TCP send integration needs completion.
  - Phase 4 startup reconciliation still focuses on print queue and should expand to non-print pending actions.
  - Runtime diagnostics can be expanded with explicit dead-letter inspection and recovery commands in support-facing surfaces.

next_implementation_queue:
  - priority: P1
    item: Integrate actual Android-native RAW TCP printer transport into queue processor.
    done_when:
      - Queue processor performs real network send for print jobs
      - Success and failure transitions remain consistent with current state machine
  - priority: P1
    item: Add non-print pending action reconciliation model (sync/report placeholders) using same queue semantics.
    done_when:
      - Pending action store is persisted
      - Worker can process mixed action types
  - priority: P2
    item: Expand native runtime status snapshots with dead-letter details and last retry outcomes.
    done_when:
      - Runtime status includes structured queue diagnostics
      - Pending actions surface exposes actionable retry context

handover_instructions_for_android_studio_agent:
  - Preserve existing frontend compatibility contracts unless migration step explicitly requires change.
  - Do not remove HTTP fallback paths in compatibility providers.
  - Keep migration status updates in migration-execution-plan.md after each implementation slice.
  - Keep all changes backward compatible with current local settings keys (including printer.lan).

