          - image_url: string|null
          - sort_order: number
    success_responses:
      create_post:
        status: 201
        returns_full_object: true
        shape:
          - id: uuid
          - name: string
          - image_url: string|null
          - sort_order: number
          - created_at: number_ms_epoch
      update_patch:
        status: 200
        returns_full_object: true
        shape:
          - id: uuid
          - name: string
          - image_url: string|null
          - sort_order: number
          - created_at: number_ms_epoch

  menu-item-category-map:
    endpoint_paths:
      list: GET /api/menu-item-category-map
      create: POST /api/menu-item-category-map
      delete: DELETE /api/menu-item-category-map/:id
    auth:
      create_delete: not_admin_guarded_in_current_route
      read: public
    request_payloads:
      create_post:
        required:
          - menu_item_id: uuid
          - menu_category_id: uuid
        optional: []
        server_added:
          - id: uuid
      update_patch_or_put:
        supported: false
        notes:
          - No PATCH or PUT endpoint exists for this resource.
          - To change mapping, client should DELETE old map and POST a new map.
    success_responses:
      create_post:
        status: 201
        returns_full_object: true
        shape:
          - id: uuid
          - menu_item_id: uuid
          - menu_category_id: uuid

notes:
  - Menu item create/update responses include category_ids from serializer.
  - Menu category create/update responses currently return repository object directly (not enriched serializer shape).
  - This file reflects current implementation behavior, not desired future API redesign.
