<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Receipt</title>
    <style>
      @font-face {
        font-family: "Khmer";
        src: url("./Khmer-Regular.ttf") format("truetype");
        font-weight: normal;
        font-style: normal;
      }
      body {
        width: 70mm;
        margin: 0 !important;
        padding: 0 !important;
        font-family: "Khmer", Arial, sans-serif;
        font-size: 14px;
        color: #000;
        box-sizing: border-box;
      }
      .center {
        text-align: center;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 8px;
        margin-bottom: 32px;
        table-layout: fixed;
      }
      th,
      td {
        padding: 4px;
        text-align: left;
        font-size: 14px;
        border: 1px solid rgba(0, 0, 0, 1);
        box-sizing: border-box;
        overflow-wrap: break-word;
      }
      th.item,
      td.item {
        width: 30%;
      }
      th.customizations,
      td.customizations {
        width: 55%;
      }
      th.qty,
      td.qty {
        text-align: right;
        width: 15%;
      }
    </style>
  </head>
  <body>
    <div class="center"><strong>{{title}}</strong></div>
    <br />

    <div>Order ID: {{orderId}}</div>
    <div>Date: {{date}}</div>

    <table>
      <thead>
        <tr>
          <th class="item">{{itemsHeader}}</th>
          <th class="customizations">{{customizationsHeader}}</th>
          <th class="qty">{{quantityHeader}}</th>
        </tr>
      </thead>
      <tbody>
        {{items}}
      </tbody>
    </table>
  </body>
</html>
